<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Control SAP Logística</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    :root {
        --bg-app: #0b1220;
        --bg-sidebar: #0f1729;
        --bg-sidebar-2: #131d33;
        --bg-card: #ffffff;
        --bg-main: #eef1f6;
        --accent: #2dd4bf;
        --accent-soft: rgba(45, 212, 191, 0.12);
        --accent-amber: #f59e0b;
        --text-primary: #e7ecf5;
        --text-muted: #8694ab;
        --text-dark: #1a2236;
        --border-soft: rgba(255,255,255,0.07);
        --shadow-deep: 0 20px 40px -12px rgba(5, 10, 25, 0.55);
        --radius-lg: 16px;
        --radius-md: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
        font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
        background-color: var(--bg-app);
        color: var(--text-primary);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
        width: 290px;
        min-width: 290px;
        background: linear-gradient(180deg, var(--bg-sidebar) 0%, var(--bg-sidebar-2) 100%);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border-soft);
        transition: margin-left 0.35s cubic-bezier(.4,0,.2,1), box-shadow 0.35s ease;
        position: relative;
        z-index: 30;
    }

    .sidebar-header {
        padding: 22px 22px 20px 22px;
        border-bottom: 1px solid var(--border-soft);
        display: flex;
        align-items: center;
        gap: 14px;
    }
    .logo-mark {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--accent) 0%, #0ea5a3 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: #04211f;
        flex-shrink: 0;
        box-shadow: 0 6px 16px -4px rgba(45, 212, 191, 0.5);
    }
    .logo-text { line-height: 1.25; }
    .logo-text .title {
        font-size: 14.5px;
        font-weight: 700;
        letter-spacing: 0.3px;
        color: #fff;
    }
    .logo-text .subtitle {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 0.4px;
        text-transform: uppercase;
    }

    .status-bar {
        margin: 16px 22px 6px 22px;
        padding: 10px 14px;
        background: rgba(45, 212, 191, 0.08);
        border: 1px solid rgba(45, 212, 191, 0.18);
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12.5px;
        color: #b9f3ea;
    }
    .pulse-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.7);
        animation: pulse 2s infinite;
        flex-shrink: 0;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0.55); }
        70% { box-shadow: 0 0 0 7px rgba(45, 212, 191, 0); }
        100% { box-shadow: 0 0 0 0 rgba(45, 212, 191, 0); }
    }

    .menu-section-label {
        margin: 22px 26px 8px 26px;
        font-size: 10.5px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--text-muted);
        font-weight: 600;
    }

    .menu-options {
        flex-grow: 1;
        padding: 4px 16px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
    }

    .menu-btn {
        position: relative;
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-muted);
        padding: 13px 14px;
        text-align: left;
        font-size: 13.5px;
        font-weight: 500;
        cursor: pointer;
        border-radius: var(--radius-md);
        transition: all 0.25s ease;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 13px;
        overflow: hidden;
    }
    .menu-btn .icon-wrap {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: rgba(255,255,255,0.04);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        color: var(--text-muted);
        transition: all 0.25s ease;
        flex-shrink: 0;
    }
    .menu-btn span.label { white-space: nowrap; }
    .menu-btn::before {
        content: "";
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 3px;
        background: var(--accent);
        transform: scaleY(0);
        transition: transform 0.25s ease;
        border-radius: 0 4px 4px 0;
    }
    .menu-btn:hover {
        background-color: rgba(255,255,255,0.05);
        color: #fff;
        transform: translateX(2px);
    }
    .menu-btn:hover .icon-wrap {
        background: rgba(255,255,255,0.08);
        color: #fff;
    }
    .menu-btn.active {
        background: linear-gradient(90deg, var(--accent-soft) 0%, rgba(45,212,191,0.02) 100%);
        color: #fff;
        font-weight: 600;
        border-color: rgba(45, 212, 191, 0.25);
    }
    .menu-btn.active::before { transform: scaleY(1); }
    .menu-btn.active .icon-wrap {
        background: var(--accent);
        color: #04211f;
        box-shadow: 0 4px 12px -2px rgba(45, 212, 191, 0.55);
    }

    .sidebar-footer {
        padding: 16px 22px;
        border-top: 1px solid var(--border-soft);
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .sidebar-footer .ver-tag {
        background: rgba(255,255,255,0.06);
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 600;
        letter-spacing: 0.3px;
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        background: var(--bg-main);
        min-width: 0;
    }

    .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 28px;
        background: var(--bg-card);
        border-bottom: 1px solid #e3e8f0;
        gap: 16px;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .hamburger {
        display: none;
        background: var(--bg-main);
        border: 1px solid #dde3ee;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--text-dark);
        font-size: 15px;
        flex-shrink: 0;
        transition: all 0.2s ease;
    }
    .hamburger:hover { background: #e2e8f5; }
    .topbar-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .topbar-sub {
        font-size: 12px;
        color: #97a2b8;
        margin-top: 2px;
    }
    .topbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
    }
    .refresh-btn {
        background: var(--accent-soft);
        color: #0d7a72;
        border: 1px solid rgba(45,212,191,0.3);
        padding: 9px 14px;
        border-radius: 9px;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 7px;
        transition: all 0.2s ease;
    }
    .refresh-btn:hover { background: rgba(45,212,191,0.22); }
    .refresh-btn i { transition: transform 0.5s ease; }
    .refresh-btn.spinning i { animation: spin 0.6s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .frame-area {
        flex-grow: 1;
        padding: 20px 28px 28px 28px;
        min-height: 0;
        display: flex;
    }
    .frame-card {
        position: relative;
        flex-grow: 1;
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-deep);
        overflow: hidden;
        border: 1px solid #e3e8f0;
    }
    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
        display: block;
    }

    /* loading overlay */
    .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.92);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
        z-index: 10;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .spinner {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 4px solid #dfe6f0;
        border-top-color: var(--accent);
        animation: rotate 0.8s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }
    .loading-text {
        font-size: 12.5px;
        color: var(--text-muted);
        font-weight: 600;
        letter-spacing: 0.3px;
    }
    .progress-track {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: transparent;
        z-index: 11;
        overflow: hidden;
    }
    .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--accent-amber));
        transition: width 0.3s ease;
    }
    .progress-bar.loading { animation: loadbar 0.9s ease forwards; }
    @keyframes loadbar {
        0% { width: 0%; }
        60% { width: 75%; }
        100% { width: 100%; }
    }

    /* overlay backdrop for mobile sidebar */
    .backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(5,10,25,0.5);
        z-index: 20;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    .backdrop.show { display: block; opacity: 1; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 880px) {
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            margin-left: -290px;
            box-shadow: none;
        }
        .sidebar.open {
            margin-left: 0;
            box-shadow: 16px 0 40px rgba(0,0,0,0.35);
        }
        .hamburger { display: flex; }
        .frame-area { padding: 14px; }
        .topbar { padding: 14px 16px; }
        .topbar-sub { display: none; }
    }
</style>
</head>
<body>

    <div class="backdrop" id="backdrop" onclick="toggleSidebar(false)"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-mark"><i class="fa-solid fa-truck-fast"></i></div>
            <div class="logo-text">
                <div class="title">CENTRAL DE HERRAMIENTAS</div>
                <div class="subtitle">SAP · Logística</div>
            </div>
        </div>

        <div class="status-bar">
            <span class="pulse-dot"></span>
            Usuario en línea · Sesión activa
        </div>

        <div class="menu-section-label">Procesos</div>
        <div class="menu-options">
            <button class="menu-btn active" onclick="cargarApp(this, 'https://lautinax.github.io/va05/')">
                <span class="icon-wrap"><i class="fa-solid fa-box-archive"></i></span>
                <span class="label">Para enviar a back office</span>
            </button>
            <button class="menu-btn" onclick="cargarApp(this, 'https://lautinax.github.io/descuento/')">
                <span class="icon-wrap"><i class="fa-solid fa-percent"></i></span>
                <span class="label">Aplicar Descuento omitidos</span>
            </button>
            <button class="menu-btn" onclick="cargarApp(this, 'https://lautinax.github.io/laburo/')">
                <span class="icon-wrap"><i class="fa-solid fa-sack-dollar"></i></span>
                <span class="label">Detalles de pedidos sin procesar</span>
            </button>
            <button class="menu-btn" onclick="cargarApp(this, 'https://lautinax.github.io/pedido-en-preparacion/')">
                <span class="icon-wrap"><i class="fa-solid fa-truck-ramp-box"></i></span>
                <span class="label">Pedidos en preparación</span>
            </button>
        </div>

        <div class="sidebar-footer">
            <span>Panel Logístico v2.0</span>
            <span class="ver-tag">ONLINE</span>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-left">
                <button class="hamburger" id="hamburger" onclick="toggleSidebar(true)">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div>
                    <div class="topbar-title" id="topbarTitle">Para enviar a back office</div>
                    <div class="topbar-sub">Vista activa en el panel central</div>
                </div>
            </div>
            <div class="topbar-right">
                <button class="refresh-btn" id="refreshBtn" onclick="recargarActual()">
                    <i class="fa-solid fa-rotate-right"></i> Actualizar
                </button>
            </div>
        </div>

        <div class="frame-area">
            <div class="frame-card">
                <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <div class="loading-text">Cargando módulo...</div>
                </div>
                <iframe id="pantalla-interna" src="https://lautinax.github.io/va05/"></iframe>
            </div>
        </div>
    </div>

    <script>
        let urlActual = 'https://lautinax.github.io/va05/';

        function cargarApp(boton, url) {
            urlActual = url;
            mostrarCarga();
            document.getElementById('pantalla-interna').src = url;

            const botones = document.querySelectorAll('.menu-btn');
            botones.forEach(btn => btn.classList.remove('active'));
            boton.classList.add('active');

            document.getElementById('topbarTitle').textContent = boton.querySelector('.label').textContent;

            // Cierra el sidebar en mobile al elegir una opción
            if (window.innerWidth <= 880) {
                toggleSidebar(false);
            }
        }

        function mostrarCarga() {
            const overlay = document.getElementById('loadingOverlay');
            const bar = document.getElementById('progressBar');
            overlay.classList.add('show');
            bar.classList.remove('loading');
            void bar.offsetWidth; // reinicia animación
            bar.classList.add('loading');
        }

        function ocultarCarga() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('show');
        }

        document.getElementById('pantalla-interna').addEventListener('load', () => {
            setTimeout(ocultarCarga, 250);
        });

        function recargarActual() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            mostrarCarga();
            document.getElementById('pantalla-interna').src = urlActual;
            setTimeout(() => btn.classList.remove('spinning'), 650);
        }

        function toggleSidebar(open) {
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('backdrop');
            if (open) {
                sidebar.classList.add('open');
                backdrop.classList.add('show');
            } else {
                sidebar.classList.remove('open');
                backdrop.classList.remove('show');
            }
        }
    </script>

</body>
</html>
